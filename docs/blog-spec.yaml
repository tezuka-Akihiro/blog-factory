# spec.yaml - 外部変数仕様書
# 実装・テスト・仕様書で共通参照するリテラル値定義

# ==========================================
# メタデータ
# ==========================================
metadata:
  feature_name: "blog-posts"
  slug: "posts"
  created_date: "2025-11-14"
  last_updated: "2025-11-14"
  version: "1.0.0"

# ==========================================
# SEO・メタタグ設定
# ==========================================
meta:
  description: "Browse our collection of articles covering web development, programming, and technology."

# ==========================================
# サーバー処理設定 (Loader/Action)
# ==========================================
server_io:
  loader:
    # 記事一覧取得のデフォルト設定
    default_sort: "desc"
  action:
    # このセクションではactionは不要（記事一覧は閲覧のみ）
    intents: {}

# ==========================================
# カテゴリ定義
# ==========================================
categories:
  - id: 1
    name: "ClaudeMix ガイド"
    emoji: "📖"
    description: "Claude Code公式ドキュメントの翻訳・まとめ"
    use_case: "機能を調べたいときの参照用"
  - id: 2
    name: "ClaudeMix 記録"
    emoji: "📝"
    description: "トラブルシュート・最適化の実践ログ"
    use_case: "同じ問題に遭遇したときの解決策"
  - id: 3
    name: "ClaudeMix 考察"
    emoji: "💭"
    description: "設計思想・リファクタリングから得た知見"
    use_case: "設計判断の参考にしたいとき"
  - id: 4
    name: "起業"
    emoji: "💼"
    description: "起業活動・セミナー・スタートアップハブでの交流"
    use_case: "起業活動やスタートアップ関連の記事"
  - id: 5
    name: "インフォメーション"
    emoji: "ℹ️"
    description: "お知らせ・アップデート情報"
    use_case: "サービスの重要なお知らせやアップデート情報"

# ==========================================
# タグマスタ定義
# ==========================================
# ブログ記事のタグ管理
# - タグは「技術要素 + 性質」の組み合わせで使用
#   - technical: Playwright, Vitestなど、具体的な技術名
#   - nature: troubleshooting, refactoringなど、記事の起因や性質
# - YAGNI原則: 実際に記事を書いてからタグを追加
# - ソフトホワイトリスト方式: spec.yamlに登録してから使用（推奨）
#
# タググループ化方針:
# - UIでは、タグを技術グループ（Remix, Cloudflare, Claude Code, その他）ごとに表示
# - 各タグの`group`プロパティに基づいて動的にグループ表示を構築
# - グループ順序は tag_groups.order で定義
# 注: 実際に記事で使用されているタグのみを定義
tags:
  # Remix関連
  - name: "SSR"
    category: "technical"
    group: "Remix"
    description: "Server-Side Rendering"
  - name: "Vite"
    category: "technical"
    group: "Remix"
    description: "Vite ビルドツール"
  - name: "React"
    category: "technical"
    group: "Remix"
    description: "Reactライブラリ"
  - name: "Loader"
    category: "technical"
    group: "Remix"
    description: "Remix Loader"
  - name: "Nested Routing"
    category: "technical"
    group: "Remix"
    description: "Remixのネストされたルーティング"
  - name: "Playwright"
    category: "technical"
    group: "Remix"
    description: "Playwrightを使用したE2Eテスト"
  - name: "Vitest"
    category: "technical"
    group: "Remix"
    description: "Vitestを使用したユニットテスト"

  # Cloudflare関連
  - name: "Pages"
    category: "technical"
    group: "Cloudflare"
    description: "Cloudflare Pages"
  - name: "D1"
    category: "technical"
    group: "Cloudflare"
    description: "Cloudflare D1"
  - name: "R2"
    category: "technical"
    group: "Cloudflare"
    description: "Cloudflare R2"
  - name: "KV"
    category: "technical"
    group: "Cloudflare"
    description: "Cloudflare KV"

  # Claude Code関連
  - name: "MCP"
    category: "technical"
    group: "Claude Code"
    description: "Model Context Protocol"
  - name: "Skills"
    category: "technical"
    group: "Claude Code"
    description: "Claude Code Skills"
  - name: "CLAUDE.md"
    category: "technical"
    group: "Claude Code"
    description: "Claude Code CLAUDE.md"
  - name: "Subagent"
    category: "technical"
    group: "Claude Code"
    description: "Claude Code Subagents"
  - name: "rules"
    category: "technical"
    group: "Claude Code"
    description: "Claude Code Subagents"

  # その他技術
  - name: "TypeScript"
    category: "technical"
    group: "other"
    description: "TypeScript 型システム・言語機能"
  - name: "OGP"
    category: "technical"
