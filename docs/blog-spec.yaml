# ==========================================
# タググループ順序定義
# ==========================================
tag_groups:
  # UIでのタググループ表示順序
  order:
    - "Remix"
    - "Cloudflare"
    - "Claude Code"
    - "other"
    - "起業"


  # 命名規則（ガイドライン）
  naming_rules:
    - "小文字を推奨（例外: 固有名詞・略語は大文字可）"
    - "ハイフン区切り（例: spec-driven, best-practices）"
    - "略語は大文字可（例: UX, SSR, MCP）"
    - "動名詞形を推奨（例: test → testing）"
    - "単数形を推奨（例: tests → testing）"

  # 新規タグ追加時のチェックリスト
  checklist:
    - "類似タグがないか確認（表記ゆれを防ぐ）"
    - "命名規則に従っているか確認"
    - "YAGNI原則: 本当に必要か？既存タグの組み合わせで代替できないか？"
    - "spec.yamlに追加してから使用"

# ==========================================
# 記事一覧表示設定
# ==========================================
posts_config:
  page_title: "Latest Update"
  # 記事データのソース
  posts_directory: "content/posts"
  # フロントマター（YAML）で読み取るフィールド
  frontmatter_fields:
    - "title"
    - "description"
    - "publishedAt"
    - "slug"
    - "category"
    - "tags"

# ==========================================
# サムネイル画像表示設定
# ==========================================
thumbnail:
  # 表示設定
  display:
    # サムネイル表示を有効化
    enabled: true
    # サムネイルが存在しない場合の動作
    fallback: "default"
    # サムネイルを強制的に非表示にするカテゴリ
    suppressed_categories: []
    # カテゴリごとのデフォルトサムネイル設定
    default_mapping:
      "ClaudeMix ガイド":
        lg: "/core-matrix-emblem.lg.avif"
        sm: "/core-matrix-emblem.sm.avif"
      "ClaudeMix 記録":
        lg: "/core-matrix-emblem.lg.avif"
        sm: "/core-matrix-emblem.sm.avif"
      "ClaudeMix 考察":
        lg: "/core-matrix-emblem.lg.avif"
        sm: "/core-matrix-emblem.sm.avif"
      "起業":
        lg: "/category-entrepreneurship.lg.avif"
        sm: "/category-entrepreneurship.sm.avif"
      "インフォメーション":
        lg: "/category-information.lg.avif"
        sm: "/category-information.sm.avif"

  # CLS対策（レイアウトシフト防止）
  performance:
    # CSS aspect-ratio
    aspect_ratio: "1200 / 630"
    # 遅延読み込み
    loading: "lazy"
    # 非同期デコード
    decoding: "async"

  # レスポンシブ画像sizes属性（ブラウザの画像選択に使用）
  image_sizes:
    mobile_breakpoint: 767
    mobile_padding: 32
    default_width: 380

  # スタイル設定
  styles:
    # 画像コンテナのCSSクラス
    container_class: "thumbnail-container"
    # 画像のobject-fit
    object_fit: "cover"
    # 角丸
    border_radius: "8px"

# ==========================================
# UI要素セレクタ
# ==========================================
ui_selectors:
  section:
    posts_section: "[data-testid='posts-section']"
    page_title: "[data-testid='page-title']"
    post_card_grid: "[data-testid='post-card-grid']"

  card:
    post_card: "[data-testid='post-card']"
    post_title: "[data-testid='post-title']"
    post_date: "[data-testid='post-date']"
    post_link: "[data-testid='post-link']"
    category_emoji: "[data-testid='category-emoji']"
    tag_badge: "[data-testid='tag-badge']"
    thumbnail_container: "[data-testid='thumbnail-container']"
    thumbnail_image: "[data-testid='thumbnail-image']"

  filter:
    filter_toggle_button: "[data-testid='filter-toggle-button']"
    filter_panel: "[data-testid='filter-panel']"
    category_selector: "[data-testid='category-selector']"
    tag_grid: "[data-testid='tag-grid']"
    tag_group_header: "[data-testid='tag-group-header']"
    tag_button: "[data-testid='tag-button']"
    filter_submit_button: "[data-testid='filter-submit-button']"

  load_more:
    load_more_button: "[data-testid='load-more-button']"
    loading_spinner: "[data-testid='loading-spinner']"

  states:
    loading: "[data-testid='loading-spinner']"
    error: "[data-testid='error-message']"
responsive:
  grid_columns:
    mobile: 1
    tablet: 2
    desktop: 3

  tag_grid_columns:
    default: 3

  card_spacing:
    mobile: "16px"
    tablet: "20px"
    desktop: "24px"

# ==========================================
# メッセージ定数
# ==========================================
messages:
  loading:
    posts: "記事を読み込んでいます..."

  error:
    fetch_failed: "記事の取得に失敗しました"
    no_posts: "記事が見つかりませんでした"
    network: "通信エラーが発生しました"
    server: "サーバーエラーが発生しました"

  empty_state:
    title: "記事がありません"
    description: "現在公開されている記事はありません"

  lock_message: "ログインで読む"

  filter:
    submit_label: "フィルタ適用"
    all_categories_label: "All Categories"

  load_more:
    button_label: "More"
    loading_label: "Loading..."
    no_more_posts: "すべての記事を読み込みました"

# ==========================================
# 日付フォーマット設定
# ==========================================
date_format:
  iso_format: "YYYY-MM-DD"
  display_format: "YYYY年M月D日"
  display_separator: "."
  locale: "ja-JP"

# ==========================================
# ビジネスルール定義
# ==========================================
# アプリケーション全体で使用される定数値
business_rules:
  load_more:
    posts_per_load: 6
    initial_load: 6

  display:
    max_tags_per_card: 5
    default_category_emoji: "📄"

# ==========================================
# アクセシビリティ (ARIA)
# ==========================================
accessibility:
  aria_labels:
    posts_section: "Latest Update"
    post_card: "記事カード"
    post_link: "記事詳細へ移動"
    load_more_button: "さらに記事を読み込む"

  semantic_elements:
    section_role: "region"
    card_role: "article"

# ==========================================
# アクセス制御設定
# ==========================================
access_control:
  # 公開カテゴリ（未ログインでもアクセス可能）
  public_categories:
    - "起業"
    - "インフォメーション"
